services:
  - type: web
    name: insightiq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insightiq-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: insightiq-db
    plan: free